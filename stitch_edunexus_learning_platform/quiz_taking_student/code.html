<body class="bg-background text-on-background h-full font-body-md overflow-hidden flex flex-col">
<!-- Top Bar -->
<header class="sticky top-0 w-full z-40 bg-surface dark:bg-surface border-b border-hairline-soft h-16 flex justify-between items-center px-lg shrink-0">
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary">Advanced Machine Learning - Midterm</h1>
</div>
<div class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">schedule</span>
<span class="font-bold text-ink">45:12</span>
<span>remaining</span>
</div>
<div class="flex items-center gap-4">
<button class="bg-primary text-on-primary font-label-md text-label-md rounded-full px-6 py-2 hover:opacity-90 transition-opacity">
                Nộp bài
            </button>
<button class="md:hidden text-on-surface-variant" id="toggle-sidebar">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<div class="flex flex-1 overflow-hidden">
<!-- Canvas -->
<main class="flex-1 overflow-y-auto p-lg md:p-xxl flex justify-center bg-canvas">
<div class="w-full max-w-[720px] flex flex-col pt-8 pb-section">
<div class="flex justify-between items-center mb-6">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Question 12 of 40</span>
<button class="text-attention hover:opacity-80 transition-opacity flex items-center gap-1 font-label-md text-label-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                        Đánh dấu
                    </button>
</div>
<h2 class="font-headline-md text-headline-md text-ink mb-8 leading-relaxed">
                    Which of the following activation functions is most likely to suffer from the "vanishing gradient" problem in deep neural networks?
                </h2>
<div class="flex flex-col gap-4 mb-section">
<label class="flex items-start gap-4 p-4 rounded-xl border border-hairline-soft hover:bg-surface-soft cursor-pointer transition-colors">
<div class="pt-1">
<input class="w-5 h-5 text-primary border-outline focus:ring-primary" name="q12" type="radio"/>
</div>
<span class="font-body-lg text-body-lg text-on-surface">ReLU (Rectified Linear Unit)</span>
</label>
<label class="flex items-start gap-4 p-4 rounded-xl border-2 border-primary bg-primary-fixed/20 cursor-pointer transition-colors">
<div class="pt-1">
<input checked="" class="w-5 h-5 text-primary border-outline focus:ring-primary" name="q12" type="radio"/>
</div>
<span class="font-body-lg text-body-lg text-on-surface font-semibold">Sigmoid</span>
</label>
<label class="flex items-start gap-4 p-4 rounded-xl border border-hairline-soft hover:bg-surface-soft cursor-pointer transition-colors">
<div class="pt-1">
<input class="w-5 h-5 text-primary border-outline focus:ring-primary" name="q12" type="radio"/>
</div>
<span class="font-body-lg text-body-lg text-on-surface">Leaky ReLU</span>
</label>
<label class="flex items-start gap-4 p-4 rounded-xl border border-hairline-soft hover:bg-surface-soft cursor-pointer transition-colors">
<div class="pt-1">
<input class="w-5 h-5 text-primary border-outline focus:ring-primary" name="q12" type="radio"/>
</div>
<span class="font-body-lg text-body-lg text-on-surface">Softmax</span>
</label>
</div>
<div class="flex justify-between items-center mt-auto">
<button class="flex items-center gap-2 text-ink border border-hairline hover:bg-surface-soft rounded-full px-6 py-3 font-label-md text-label-md transition-colors">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                        Câu trước
                    </button>
<button class="flex items-center gap-2 bg-ink text-canvas hover:opacity-90 rounded-full px-8 py-3 font-label-md text-label-md transition-opacity">
                        Câu sau
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Right Sidebar (Question Navigator) -->
<aside class="hidden md:flex flex-col w-80 bg-surface border-l border-hairline-soft shrink-0 h-full overflow-y-auto" id="question-sidebar">

<h3 class="font-label-md text-label-md text-ink uppercase tracking-wider mb-2">Question Navigator</h3>
<div class="flex gap-4 text-xs text-on-surface-variant">
<div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-ink-deep"></div> Answered</div>
<div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full border border-outline"></div> Unanswered</div>
</div>
</div>
<div class="p-6">
<div class="grid grid-cols-5 gap-3">
<!-- Sample Grid Generation -->
<button class="w-10 h-10 rounded-full bg-ink-deep text-canvas font-label-md text-sm flex items-center justify-center">1</button>
<button class="w-10 h-10 rounded-full bg-ink-deep text-canvas font-label-md text-sm flex items-center justify-center">2</button>
<button class="w-10 h-10 rounded-full bg-ink-deep text-canvas font-label-md text-sm flex items-center justify-center">3</button>
<button class="w-10 h-10 rounded-full bg-attention text-on-secondary-fixed font-label-md text-sm flex items-center justify-center relative">
                        4
                        <span class="absolute -top-1 -right-1 w-3 h-3 bg-canvas rounded-full flex items-center justify-center"><span class="material-symbols-outlined text-[10px] text-attention" style="font-variation-settings: 'FILL' 1;">star</span></span>
</button>
<button class="w-10 h-10 rounded-full bg-ink-deep text-canvas font-label-md text-sm flex items-center justify-center">5</button>
<button class="w-10 h-10 rounded-full bg-ink-deep text-canvas font-label-md text-sm flex items-center justify-center">6</button>
<button class="w-10 h-10 rounded-full bg-ink-deep text-canvas font-label-md text-sm flex items-center justify-center">7</button>
<button class="w-10 h-10 rounded-full bg-ink-deep text-canvas font-label-md text-sm flex items-center justify-center">8</button>
<button class="w-10 h-10 rounded-full bg-ink-deep text-canvas font-label-md text-sm flex items-center justify-center">9</button>
<button class="w-10 h-10 rounded-full bg-ink-deep text-canvas font-label-md text-sm flex items-center justify-center">10</button>
<button class="w-10 h-10 rounded-full bg-ink-deep text-canvas font-label-md text-sm flex items-center justify-center">11</button>
<button class="w-10 h-10 rounded-full bg-primary text-canvas font-label-md text-sm flex items-center justify-center ring-2 ring-primary ring-offset-2">12</button>
<button class="w-10 h-10 rounded-full border border-outline text-on-surface-variant font-label-md text-sm flex items-center justify-center hover:border-primary hover:text-primary">13</button>
<button class="w-10 h-10 rounded-full border border-outline text-on-surface-variant font-label-md text-sm flex items-center justify-center hover:border-primary hover:text-primary">14</button>
<button class="w-10 h-10 rounded-full border border-outline text-on-surface-variant font-label-md text-sm flex items-center justify-center hover:border-primary hover:text-primary">15</button>
<!-- More placeholders -->
<button class="w-10 h-10 rounded-full border border-outline text-on-surface-variant font-label-md text-sm flex items-center justify-center hover:border-primary hover:text-primary">...</button>
<button class="w-10 h-10 rounded-full border border-outline text-on-surface-variant font-label-md text-sm flex items-center justify-center hover:border-primary hover:text-primary">40</button>
</div>
</div>
</aside>
</div>
<script>
        document.getElementById('toggle-sidebar').addEventListener('click', function() {
            const sidebar = document.getElementById('question-sidebar');
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('absolute', 'right-0', 'top-16', 'bottom-0', 'z-30', 'shadow-lg');
            } else {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('absolute', 'right-0', 'top-16', 'bottom-0', 'z-30', 'shadow-lg');
            }
        });
    </script>
