<body class="bg-canvas font-body-md text-on-surface h-screen overflow-hidden flex selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Left Panel: Hero Image -->
<div class="hidden lg:flex w-[60%] relative h-full bg-surface-variant flex-col justify-between p-section">
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center" data-alt="A vibrant, cinematic shot of diverse university students collaborating in a modern, light-filled campus atrium. They are actively engaged with laptops and digital tablets, illuminated by soft, natural sunlight streaming through large glass windows. The overarching mood is optimistic, collaborative, and focused on learning. The color palette features natural daylight, crisp whites, and subtle cobalt blue accents reflecting a modern EdTech corporate aesthetic. High resolution, professional architectural photography style." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC5kZm4ShJZQxxP0TmMl2eRONs51ey9sfSnU83EuJZir-FBBSpFAGx4hY5_mvyaeueBmddkD0J1RXsdymC5ToFUMdtqYjSC8mwzuX82qqTgsIIfjKCuU0vmHS3j3CQQg3PFkApaK41kPUgpgyd6q0Tf7573XPRtn9OoITNRwar2e6MXD47gB-TvDTek_tJd8POOmiSoIVw9IsCC5cm3xRgMHc7eL6k709SKdUKwLttoYvA2ZgyTjq-Dkz3wEJKyfg6enBCRCI80dmc')"></div>
<div class="absolute inset-0 bg-ink-deep/60 backdrop-blur-[2px]"></div>
</div>
<div class="relative z-10">
<h1 class="font-display-lg text-display-lg text-on-primary mb-lg">EduNexus</h1>
</div>
<div class="relative z-10 max-w-xl">
<p class="font-headline-lg text-headline-lg text-on-primary leading-tight">
                Nền tảng Học tập &amp; Đào tạo Tích hợp AI
            </p>
<p class="font-body-lg text-body-lg text-surface-soft mt-base max-w-md opacity-90">
                Khơi nguồn tiềm năng, kết nối tri thức. Giải pháp toàn diện cho không gian giáo dục hiện đại.
            </p>
</div>
</div>
<!-- Right Panel: Login Form -->
<div class="w-full lg:w-[40%] flex items-center justify-center h-full bg-canvas relative overflow-y-auto">
<!-- Mobile Logo (Hidden on desktop) -->
<div class="absolute top-section left-0 w-full flex justify-center lg:hidden">
<h1 class="font-headline-md text-headline-md text-primary font-bold">EduNexus</h1>
</div>
<div class="w-full max-w-md p-xxl">
<!-- Header -->
<div class="mb-section text-center lg:text-left">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Đăng nhập</h2>
<p class="font-body-md text-body-md text-secondary">Chào mừng trở lại! Vui lòng nhập thông tin của bạn.</p>
</div>
<!-- Form -->
<form class="space-y-lg">
<!-- Email Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 0;">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-hairline rounded-lg bg-surface-lowest text-on-surface font-body-md placeholder-outline focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="email" name="email" placeholder="hoang.nguyen@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="password">Mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-hairline rounded-lg bg-surface-lowest text-on-surface font-body-md placeholder-outline focus:ring-2 focus:ring-primary focus:border-primary transition-shadow duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between mt-4">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-hairline rounded transition-colors cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                            Ghi nhớ tôi
                        </label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Quên mật khẩu?</a>
</div>
</div>
<!-- Submit Button (CTA Black) -->
<div class="pt-base">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-sm font-label-md text-label-md text-white bg-ink hover:bg-ink-deep focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-ink transition-colors active:scale-[0.98] duration-150" type="submit">
                        Đăng nhập
                    </button>
</div>
</form>
<!-- Divider -->
<div class="mt-section relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-hairline"></div>
</div>
<div class="relative flex justify-center">
<span class="px-2 bg-canvas font-body-sm text-body-sm text-secondary">Hoặc tiếp tục với</span>
</div>
</div>
<!-- Social Login -->
<div class="mt-base">
<button class="w-full inline-flex justify-center items-center py-3 px-4 border border-hairline rounded-full bg-surface-lowest hover:bg-surface-soft font-label-md text-label-md text-on-surface transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-hairline active:scale-[0.98] duration-150 gap-2" type="button">
<svg class="h-5 w-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Đăng nhập bằng Google
                </button>
</div>
<!-- Footer -->
<div class="mt-section text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Chưa có tài khoản? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Đăng ký ngay</a>
</p>
</div>
</div>
</div>
</body></html>
