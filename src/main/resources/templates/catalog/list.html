<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-public :: layout(~{::title}, ~{::section})}">
<head><title>EduNexus - Danh mục khóa học</title></head>
<body>
<section>
  <h1 class="font-headline-lg text-headline-lg text-ink-deep mb-2">Danh mục khóa học</h1>
  <p class="font-body-md text-secondary mb-section">Khám phá các khóa học và lớp học đang mở, xem trước nội dung mẫu miễn phí.</p>

  <h2 class="font-headline-md text-headline-md text-ink mb-4">Khóa học</h2>
  <div th:if="${#lists.isEmpty(courses)}" class="text-secondary font-body-sm mb-section">Chưa có khóa học nào được công bố.</div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-section">
    <a th:each="course : ${courses}" th:href="@{'/catalog/courses/' + ${course.id}}"
       class="block p-5 rounded-xl border border-hairline-soft hover:shadow-md transition-shadow bg-canvas">
      <p class="font-headline-md text-headline-md text-ink mb-1" th:text="${course.title}">Course title</p>
      <p class="font-body-sm text-secondary line-clamp-2 mb-3" th:text="${course.description}">Description</p>
      <p class="font-label-md text-primary" th:text="${course.unitPrice != null ? #numbers.formatDecimal(course.unitPrice, 0, 'COMMA', 0, 'POINT') + ' VND' : 'Chưa niêm yết giá'}">Price</p>
    </a>
  </div>

  <h2 class="font-headline-md text-headline-md text-ink mb-4">Lớp học đang mở</h2>
  <div th:if="${#lists.isEmpty(classes)}" class="text-secondary font-body-sm">Chưa có lớp học nào đang mở.</div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <a th:each="cls : ${classes}" th:href="@{'/catalog/classes/' + ${cls.id}}"
       class="block p-5 rounded-xl border border-hairline-soft hover:shadow-md transition-shadow bg-canvas">
      <p class="font-headline-md text-headline-md text-ink mb-1" th:text="${cls.name}">Class name</p>
      <p class="font-body-sm text-secondary mb-1" th:text="'Khóa gốc: ' + ${cls.sourceCourse.title}">Source course</p>
      <p class="font-body-sm text-secondary mb-3" th:text="${cls.startDate} + ' - ' + ${cls.endDate}">Dates</p>
      <p class="font-label-md text-primary" th:text="${#numbers.formatDecimal(cls.fee, 0, 'COMMA', 0, 'POINT')} + ' VND'">Fee</p>
    </a>
  </div>
</section>
</body>
</html>
