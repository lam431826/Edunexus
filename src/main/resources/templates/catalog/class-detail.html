<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-public :: layout(~{::title}, ~{::section})}">
<head><title th:text="'EduNexus - ' + ${classEntity.name}">EduNexus</title></head>
<body>
<section class="max-w-3xl">
  <a href="/catalog" class="font-label-md text-secondary hover:text-ink mb-4 inline-block">&larr; Danh mục khóa học</a>
  <h1 class="font-headline-lg text-headline-lg text-ink-deep mb-2" th:text="${classEntity.name}">Class name</h1>
  <p class="font-body-md text-secondary mb-1">
    Khóa gốc: <a th:href="@{'/catalog/courses/' + ${classEntity.sourceCourse.id}}" class="text-primary" th:text="${classEntity.sourceCourse.title}">Course</a>
  </p>
  <p class="font-body-sm text-secondary mb-1" th:text="'Giáo viên: ' + (${classEntity.teacher} != null ? ${classEntity.teacher.name} : 'Chưa phân công')">Teacher</p>
  <p class="font-body-sm text-secondary mb-1" th:text="'Thời gian: ' + ${classEntity.startDate} + ' - ' + ${classEntity.endDate}">Dates</p>
  <p class="font-body-sm text-secondary mb-4" th:text="'Sĩ số tối đa: ' + ${classEntity.maxSize}">Max size</p>
  <p class="font-label-md text-primary text-headline-md mb-section" th:text="${#numbers.formatDecimal(classEntity.fee, 0, 'COMMA', 0, 'POINT')} + ' VND'">Fee</p>

  <a href="/register" class="inline-block px-6 py-3 rounded-full bg-ink text-white font-label-md hover:bg-ink-deep transition-colors">Đăng ký để ghi danh</a>
</section>
</body>
</html>
