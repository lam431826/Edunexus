<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-admin :: layout(~{::title}, ~{::section})}">
<head><title>EduNexus - Chi tiết khóa học</title></head>
<body>
<section>
  <a href="/admin/courses" class="text-primary font-label-md text-label-md flex items-center gap-1 mb-4">
    <span class="material-symbols-outlined text-[18px]">arrow_back</span> Quay lại danh sách
  </a>

  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="font-headline-lg text-headline-lg text-ink-deep" th:text="${course.title}">Course title</h1>
      <p class="text-secondary font-body-sm" th:text="${course.description}">Description</p>
    </div>
    <form th:action="@{'/admin/courses/' + ${course.id} + '/unpublish'}" method="post"
          th:if="${course.status.name() == 'PUBLISHED'}">
      <button type="submit" class="px-5 py-2 rounded-full border border-critical text-critical font-label-md hover:bg-error-container/10">
        Gỡ xuất bản
      </button>
    </form>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
    <div class="rounded-xl border border-hairline-soft p-5">
      <p class="text-secondary text-[12px] mb-1">Chủ sở hữu (SME)</p>
      <p class="font-label-md text-ink" th:text="${course.owner.name}">Owner</p>
    </div>
    <div class="rounded-xl border border-hairline-soft p-5">
      <p class="text-secondary text-[12px] mb-1">Nhóm khóa học</p>
      <p class="font-label-md text-ink" th:text="${course.courseGroup != null ? course.courseGroup.name : '-'}">Group</p>
    </div>
    <div class="rounded-xl border border-hairline-soft p-5">
      <p class="text-secondary text-[12px] mb-1">Trạng thái</p>
      <span class="px-2.5 py-1 rounded-full text-[11px] font-label-md uppercase"
            th:classappend="${course.status.name() == 'PUBLISHED'} ? 'bg-success/10 text-success' : 'bg-attention/10 text-attention'"
            th:text="${course.status}">Status</span>
    </div>
    <div class="rounded-xl border border-hairline-soft p-5">
      <p class="text-secondary text-[12px] mb-1">Giá (H1)</p>
      <p class="font-label-md text-ink" th:text="${course.unitPrice != null ? #numbers.formatDecimal(course.unitPrice, 0, 'COMMA', 0, 'POINT') + ' đ' : 'Chưa thiết lập'}">Price</p>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="rounded-xxxl border border-hairline-soft bg-canvas p-6">
      <h2 class="font-headline-md text-headline-md text-ink mb-4" th:text="'Học phần (' + ${#lists.size(modules)} + ')'">Modules</h2>
      <div th:if="${#lists.isEmpty(modules)}" class="text-secondary font-body-sm py-4 text-center">Chưa có học phần nào.</div>
      <ol class="space-y-2 list-decimal list-inside">
        <li th:each="m : ${modules}" class="font-label-md text-ink" th:text="${m.title}">Module</li>
      </ol>
    </div>

    <div class="rounded-xxxl border border-hairline-soft bg-canvas p-6">
      <h2 class="font-headline-md text-headline-md text-ink mb-4" th:text="'Lớp học sử dụng khóa học này (' + ${#lists.size(classes)} + ')'">Classes</h2>
      <div th:if="${#lists.isEmpty(classes)}" class="text-secondary font-body-sm py-4 text-center">Chưa có lớp học nào.</div>
      <div class="space-y-3">
        <div th:each="cls : ${classes}" class="flex items-center justify-between border-b border-hairline-soft pb-3 last:border-0">
          <div>
            <p class="font-label-md text-ink" th:text="${cls.name}">Class</p>
            <p class="text-secondary text-[12px]" th:text="${cls.teacher != null ? cls.teacher.name : 'Chưa gán giảng viên'}">Teacher</p>
          </div>
          <span class="px-2.5 py-1 rounded-full text-[11px] font-label-md uppercase bg-surface-container-high text-ink" th:text="${cls.status}">Status</span>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
