<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-admin :: layout(~{::title}, ~{::section})}">
<head><title>EduNexus - Chi tiết nhóm khóa học</title></head>
<body>
<section>
  <a href="/admin/course-groups" class="text-primary font-label-md text-label-md flex items-center gap-1 mb-4">
    <span class="material-symbols-outlined text-[18px]">arrow_back</span> Quay lại danh sách
  </a>
  <div class="mb-8">
    <h1 class="font-headline-lg text-headline-lg text-ink-deep" th:text="${group.name}">Group name</h1>
    <p class="text-secondary font-body-sm" th:text="${group.description}">Description</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-1 rounded-xxxl border border-hairline-soft bg-canvas p-6">
      <h2 class="font-headline-md text-headline-md text-ink mb-4">Cập nhật thông tin</h2>
      <form th:action="@{'/admin/course-groups/' + ${group.id}}" th:object="${courseGroupForm}" method="post" class="space-y-4">
        <div>
          <label class="block font-label-md text-label-md mb-1">Tên nhóm</label>
          <input th:field="*{name}" required class="w-full border border-hairline rounded-lg px-3 py-2"/>
        </div>
        <div>
          <label class="block font-label-md text-label-md mb-1">Mô tả</label>
          <textarea th:field="*{description}" rows="3" class="w-full border border-hairline rounded-lg px-3 py-2"></textarea>
        </div>
        <div>
          <label class="block font-label-md text-label-md mb-1">Trưởng nhóm phụ trách</label>
          <select th:field="*{managerId}" class="w-full border border-hairline rounded-lg px-3 py-2">
            <option value="">-- Chưa gán --</option>
            <option th:each="m : ${managers}" th:value="${m.id}" th:text="${m.name} + ' (' + ${m.email} + ')'">Manager</option>
          </select>
        </div>
        <div class="flex justify-end pt-2">
          <button type="submit" class="px-5 py-2 rounded-full bg-primary text-on-primary font-label-md">Lưu thay đổi</button>
        </div>
      </form>
    </div>

    <div class="lg:col-span-2 space-y-6">
      <div class="rounded-xxxl border border-hairline-soft bg-canvas p-6">
        <h2 class="font-headline-md text-headline-md text-ink mb-4">Khóa học trong nhóm</h2>
        <div th:if="${#lists.isEmpty(courses)}" class="text-secondary font-body-sm py-4 text-center">
          Chưa có khóa học nào thuộc nhóm này.
        </div>
        <div class="space-y-3">
          <div th:each="c : ${courses}" class="flex items-center justify-between border-b border-hairline-soft pb-3 last:border-0">
            <div>
              <p class="font-label-md text-ink" th:text="${c.title}">Course</p>
              <p class="text-secondary text-[12px]" th:text="${c.owner.name}">Owner</p>
            </div>
            <span class="px-2.5 py-1 rounded-full text-[11px] font-label-md uppercase"
                  th:classappend="${c.status.name() == 'PUBLISHED'} ? 'bg-success/10 text-success' : 'bg-attention/10 text-attention'"
                  th:text="${c.status}">Status</span>
          </div>
        </div>
      </div>

      <div class="rounded-xxxl border border-hairline-soft bg-canvas p-6">
        <h2 class="font-headline-md text-headline-md text-ink mb-4">Lớp học thuộc nhóm</h2>
        <div th:if="${#lists.isEmpty(classes)}" class="text-secondary font-body-sm py-4 text-center">
          Chưa có lớp học nào.
        </div>
        <div class="space-y-3">
          <div th:each="cls : ${classes}" class="flex items-center justify-between border-b border-hairline-soft pb-3 last:border-0">
            <div>
              <p class="font-label-md text-ink" th:text="${cls.name}">Class</p>
              <p class="text-secondary text-[12px]" th:text="${cls.teacher != null ? cls.teacher.name : 'Chưa gán giảng viên'}">Teacher</p>
            </div>
            <span class="px-2.5 py-1 rounded-full text-[11px] font-label-md uppercase bg-surface-container-high text-ink" th:text="${cls.status}">Status</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
