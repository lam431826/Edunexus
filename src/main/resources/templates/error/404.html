<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<title>404 - Không tìm thấy</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex items-center justify-center bg-gray-50 font-sans">
<div class="text-center max-w-md p-8">
  <h1 class="text-6xl font-bold text-gray-400 mb-4">404</h1>
  <p class="text-lg text-gray-700 mb-2">Không tìm thấy nội dung yêu cầu.</p>
  <p class="text-sm text-gray-500 mb-6" th:text="${message}"></p>
  <a href="/login" class="inline-block px-6 py-2 rounded-full bg-black text-white">Về trang đăng nhập</a>
</div>
</body>
</html>
