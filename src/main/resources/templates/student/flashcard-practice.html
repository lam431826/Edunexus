<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-student :: layout(~{::title}, ~{::section})}">
<head><title>EduNexus - Luyện tập thẻ ghi nhớ</title></head>
<body>
<section class="max-w-xl mx-auto text-center">
  <a th:href="@{/student/flashcards}" class="flex items-center gap-2 text-secondary hover:text-ink font-body-sm mb-6">
    <span class="material-symbols-outlined text-[18px]">arrow_back</span> Về thư viện
  </a>
  <h1 class="font-headline-lg text-headline-lg text-ink-deep mb-1" th:text="${deck.name}">Deck</h1>

  <div th:if="${#lists.isEmpty(cards)}" class="text-secondary py-16">Bộ thẻ này chưa có thẻ nào.</div>

  <div th:unless="${#lists.isEmpty(cards)}">
    <div class="w-full h-2 rounded-full bg-surface-container-high overflow-hidden mb-2">
      <div id="progressBar" class="h-full bg-primary transition-all" style="width:0%"></div>
    </div>
    <p id="cardCounter" class="text-secondary text-[12px] mb-6">1 / 1</p>

    <div id="cardViewport" onclick="flipCard()"
         class="mx-auto w-full h-64 rounded-xxxl border border-hairline-soft bg-canvas flex flex-col items-center justify-center p-8 cursor-pointer select-none shadow-sm relative">
      <span id="knownBadge" class="hidden absolute top-4 right-4 px-3 py-1 rounded-full bg-success/10 text-success text-[12px] font-label-md flex items-center gap-1">
        <span class="material-symbols-outlined text-[14px]">check_circle</span> Đã thuộc
      </span>
      <p id="cardText" class="font-headline-md text-headline-md text-ink"></p>
    </div>
    <p class="text-secondary text-[12px] mt-2">Nhấn vào thẻ để xem đáp án</p>

    <div class="flex items-center justify-center gap-3 mt-8">
      <button id="prevBtn" onclick="goPrev()" class="px-5 py-2 rounded-full border border-hairline text-ink font-label-md flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span> Lùi
      </button>
      <button id="knownBtn" onclick="toggleKnown()" class="px-6 py-2 rounded-full font-label-md flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">check_circle</span> Đã thuộc
      </button>
      <button id="nextBtn" onclick="goNext()" class="px-5 py-2 rounded-full border border-hairline text-ink font-label-md flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed">
        Tiến <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
      </button>
    </div>
  </div>

  <script th:inline="javascript">
  const cards = /*[[${cards}]]*/ [];
  let index = 0;
  let showingBack = false;

  function renderCard() {
    showingBack = false;
    const card = cards[index];
    document.getElementById('cardText').textContent = card.frontText;
    document.getElementById('cardCounter').textContent = (index + 1) + ' / ' + cards.length;
    document.getElementById('progressBar').style.width = Math.round((index + 1) * 100 / cards.length) + '%';

    document.getElementById('prevBtn').disabled = index === 0;
    document.getElementById('nextBtn').disabled = index === cards.length - 1;

    document.getElementById('knownBadge').classList.toggle('hidden', !card.known);
    const knownBtn = document.getElementById('knownBtn');
    knownBtn.className = 'px-6 py-2 rounded-full font-label-md flex items-center gap-2 ' +
      (card.known ? 'bg-success text-white' : 'bg-success/10 text-success');
  }

  function flipCard() {
    showingBack = !showingBack;
    document.getElementById('cardText').textContent = showingBack ? cards[index].backText : cards[index].frontText;
  }

  function goPrev() {
    if (index > 0) { index--; renderCard(); }
  }

  function goNext() {
    if (index < cards.length - 1) { index++; renderCard(); }
  }

  function toggleKnown() {
    const card = cards[index];
    const newLevel = card.known ? 'NEW' : 'KNOWN';
    const headerName = document.querySelector('meta[name="_csrf_header"]').content;
    const token = document.querySelector('meta[name="_csrf"]').content;
    fetch('/student/flashcards/cards/' + card.id + '/review?level=' + newLevel,
      { method: 'POST', headers: { [headerName]: token } })
      .then(() => { card.known = !card.known; renderCard(); });
  }

  renderCard();
  </script>
</section>
</body>
</html>
