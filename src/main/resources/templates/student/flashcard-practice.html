<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-student :: layout(~{::title}, ~{::section})}">
<head><title>EduNexus - Luyện tập thẻ ghi nhớ</title></head>
<body>
<section class="max-w-xl mx-auto text-center">
  <a th:href="@{/student/flashcards}" class="flex items-center gap-2 text-secondary hover:text-ink font-body-sm mb-6">
    <span class="material-symbols-outlined text-[18px]">arrow_back</span> Về thư viện
  </a>
  <h1 class="font-headline-lg text-headline-lg text-ink-deep mb-1" th:text="${deck.name}">Deck</h1>

  <div th:if="${#lists.isEmpty(cards)}" class="text-secondary py-16">Bộ thẻ này chưa có thẻ nào.</div>

  <div th:unless="${#lists.isEmpty(cards)}">
    <div class="w-full h-2 rounded-full bg-surface-container-high overflow-hidden mb-8">
      <div id="progressBar" class="h-full bg-primary" style="width:0%"></div>
    </div>

    <div id="cardViewport" onclick="flipCard()"
         class="mx-auto w-full h-64 rounded-xxxl border border-hairline-soft bg-canvas flex items-center justify-center p-8 cursor-pointer select-none shadow-sm">
      <p id="cardText" class="font-headline-md text-headline-md text-ink"></p>
    </div>
    <p class="text-secondary text-[12px] mt-2">Nhấn vào thẻ để xem đáp án</p>

    <div class="flex justify-center gap-3 mt-8">
      <button onclick="review('HARD')" class="px-6 py-2 rounded-full bg-critical/10 text-critical font-label-md">Khó</button>
      <button onclick="review('LEARNING')" class="px-6 py-2 rounded-full bg-attention/10 text-attention font-label-md">Trung bình</button>
      <button onclick="review('KNOWN')" class="px-6 py-2 rounded-full bg-success/10 text-success font-label-md">Dễ</button>
    </div>
  </div>

  <script th:inline="javascript">
  const cards = /*[[${cards}]]*/ [];
  let index = 0;
  let showingBack = false;

  function renderCard() {
    if (index >= cards.length) {
      document.getElementById('cardText').textContent = 'Bạn đã hoàn thành bộ thẻ này!';
      document.getElementById('progressBar').style.width = '100%';
      return;
    }
    showingBack = false;
    document.getElementById('cardText').textContent = cards[index].frontText;
    document.getElementById('progressBar').style.width = Math.round(index * 100 / cards.length) + '%';
  }

  function flipCard() {
    if (index >= cards.length) return;
    showingBack = !showingBack;
    document.getElementById('cardText').textContent = showingBack ? cards[index].backText : cards[index].frontText;
  }

  function review(level) {
    if (index >= cards.length) return;
    const headerName = document.querySelector('meta[name="_csrf_header"]').content;
    const token = document.querySelector('meta[name="_csrf"]').content;
    fetch('/student/flashcards/cards/' + cards[index].id + '/review?level=' + level,
      { method: 'POST', headers: { [headerName]: token } })
      .finally(() => { index++; renderCard(); });
  }

  renderCard();
  </script>
</section>
</body>
</html>
