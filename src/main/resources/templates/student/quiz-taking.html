<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-student :: layout(~{::title}, ~{::section})}">
<head><title>EduNexus - Làm bài trắc nghiệm</title></head>
<body>
<section class="flex gap-8">
  <div class="w-56 shrink-0 hidden md:block">
    <p class="font-label-md text-secondary mb-3">Câu hỏi</p>
    <div id="navGrid" class="grid grid-cols-5 gap-2"></div>
    <div class="mt-6 text-[12px] space-y-1 text-secondary">
      <p><span class="inline-block w-3 h-3 rounded bg-ink-deep mr-2"></span>Đã trả lời</p>
      <p><span class="inline-block w-3 h-3 rounded border border-hairline mr-2"></span>Chưa trả lời</p>
      <p><span class="inline-block w-3 h-3 rounded bg-attention mr-2"></span>Đã đánh dấu</p>
    </div>
  </div>

  <div class="flex-1 max-w-2xl">
    <div class="flex items-center justify-between mb-4">
      <p class="font-label-md text-secondary">Câu <span id="currentIndex">1</span>/<span id="totalCount">1</span></p>
      <p th:if="${attempt.mode.name() == 'TEST'}" id="timer" class="font-label-md text-critical"></p>
    </div>

    <div class="rounded-xl border border-hairline-soft p-6 mb-4">
      <p id="questionText" class="font-body-lg text-body-lg text-ink mb-4"></p>
      <div id="optionsContainer" class="space-y-2"></div>
    </div>

    <div class="flex items-center justify-between">
      <button id="prevBtn" class="px-5 py-2 rounded-full border border-hairline">Câu trước</button>
      <button id="flagBtn" class="px-5 py-2 rounded-full border border-attention text-attention">Đánh dấu</button>
      <button id="nextBtn" class="px-5 py-2 rounded-full border border-hairline">Câu tiếp</button>
    </div>

    <form th:action="@{'/student/quizzes/' + ${attempt.id} + '/submit'}" method="post" class="mt-6"
          onsubmit="return confirm('Bạn có chắc muốn nộp bài?');">
      <button type="submit" class="w-full px-6 py-3 rounded-full bg-primary text-on-primary font-label-md">Nộp bài</button>
    </form>
  </div>

  <script th:inline="javascript">
  const attemptId = /*[[${attempt.id}]]*/ 0;
  const questions = /*[[${questions}]]*/ [];
  const durationSeconds = /*[[${attempt.mode.name() == 'TEST'} ? (${#lists.size(questions)} * 60) : 0]]*/ 0;
  const headerName = document.querySelector('meta[name="_csrf_header"]').content;
  const token = document.querySelector('meta[name="_csrf"]').content;
  let current = 0;

  document.getElementById('totalCount').textContent = questions.length;

  function buildNav() {
    const nav = document.getElementById('navGrid');
    nav.innerHTML = '';
    questions.forEach((q, i) => {
      const btn = document.createElement('button');
      btn.textContent = i + 1;
      btn.className = 'w-9 h-9 rounded-lg text-[13px] border ' +
        (q.selectedOptionId ? 'bg-ink-deep text-white border-ink-deep' :
         (q.flagged ? 'bg-attention/20 border-attention text-attention' : 'border-hairline text-secondary'));
      btn.onclick = () => { current = i; render(); };
      nav.appendChild(btn);
    });
  }

  function render() {
    const q = questions[current];
    document.getElementById('currentIndex').textContent = current + 1;
    document.getElementById('questionText').textContent = q.text;
    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    q.options.forEach(opt => {
      const label = document.createElement('label');
      label.className = 'flex items-center gap-3 p-3 rounded-lg border cursor-pointer ' +
        (q.selectedOptionId === opt.id ? 'border-primary bg-primary/5' : 'border-hairline');
      label.innerHTML = `<input type="radio" name="opt" ${q.selectedOptionId === opt.id ? 'checked' : ''}/> <span>${opt.text}</span>`;
      label.querySelector('input').onclick = () => selectOption(opt.id);
      container.appendChild(label);
    });
    document.getElementById('flagBtn').textContent = q.flagged ? 'Bỏ đánh dấu' : 'Đánh dấu';
    buildNav();
  }

  function selectOption(optionId) {
    questions[current].selectedOptionId = optionId;
    saveAnswer();
    render();
  }

  function saveAnswer() {
    const q = questions[current];
    const params = new URLSearchParams({ questionId: q.questionId, flagged: q.flagged });
    if (q.selectedOptionId) params.append('optionId', q.selectedOptionId);
    fetch('/student/quizzes/' + attemptId + '/answer?' + params.toString(), {
      method: 'POST', headers: { [headerName]: token }
    });
  }

  document.getElementById('prevBtn').onclick = () => { if (current > 0) { current--; render(); } };
  document.getElementById('nextBtn').onclick = () => { if (current < questions.length - 1) { current++; render(); } };
  document.getElementById('flagBtn').onclick = () => {
    questions[current].flagged = !questions[current].flagged;
    saveAnswer();
    render();
  };

  if (durationSeconds > 0) {
    let remaining = durationSeconds;
    const timerEl = document.getElementById('timer');
    const tick = () => {
      const m = Math.floor(remaining / 60), s = remaining % 60;
      timerEl.textContent = m + ':' + String(s).padStart(2, '0');
      if (remaining <= 0) { document.querySelector('form').submit(); return; }
      remaining--;
    };
    tick();
    setInterval(tick, 1000);
  }

  render();
  </script>
</section>
</body>
</html>
