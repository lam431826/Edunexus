<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-student :: layout(~{::title}, ~{::section})}">
<head><title>EduNexus - Bài giảng</title></head>
<body>
<section class="flex gap-8">
  <aside class="w-72 shrink-0 hidden lg:block">
    <h3 class="font-label-md text-secondary mb-3" th:text="${course.title}">Course</h3>
    <div th:each="m : ${modules}" class="mb-4">
      <p class="font-label-md text-ink mb-2" th:text="${m.title}">Module</p>
      <ul class="space-y-1">
        <li th:each="l : ${lessonsByModule.get(m)}">
          <a th:href="@{'/student/lessons/' + ${l.id}}"
             class="flex items-center gap-2 text-[13px] px-2 py-1.5 rounded-lg"
             th:classappend="${l.id == lesson.id} ? 'bg-surface-soft text-ink font-bold' : 'text-secondary hover:text-ink'">
            <span class="material-symbols-outlined text-[16px]">play_circle</span>
            <span th:text="${l.title}">Lesson</span>
          </a>
        </li>
      </ul>
    </div>
  </aside>

  <div class="flex-1 max-w-3xl">
    <h1 class="font-headline-lg text-headline-lg text-ink-deep mb-4" th:text="${lesson.title}">Lesson</h1>

    <div th:if="${lesson.videoUrl}" class="mb-6 aspect-video bg-black rounded-xl overflow-hidden">
      <iframe th:src="${lesson.videoUrl}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="prose max-w-none mb-6 whitespace-pre-wrap font-body-md text-ink" th:text="${lesson.bodyMarkdown}">Content</div>

    <div th:if="${lesson.attachmentPaths}" class="mb-6">
      <p class="font-label-md text-secondary mb-2">Tệp đính kèm</p>
      <a th:each="path : ${#strings.arraySplit(lesson.attachmentPaths, ',')}" th:href="${path}"
         class="flex items-center gap-2 text-primary hover:underline text-[13px] mb-1">
        <span class="material-symbols-outlined text-[16px]">attach_file</span>
        <span th:text="${path}">file</span>
      </a>
    </div>

    <form th:action="@{'/student/lessons/' + ${lesson.id} + '/complete'}" method="post">
      <button type="submit" class="px-6 py-2 rounded-full font-label-md flex items-center gap-2"
              th:classappend="${completed} ? 'bg-success/10 text-success' : 'bg-primary text-on-primary'">
        <span class="material-symbols-outlined text-[18px]" th:text="${completed} ? 'check_circle' : 'arrow_forward'"></span>
        <span th:text="${completed} ? 'Đã hoàn thành - Bài tiếp theo' : 'Đánh dấu hoàn thành & Tiếp theo'"></span>
      </button>
    </form>
  </div>
</section>
</body>
</html>
