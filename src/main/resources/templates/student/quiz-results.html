<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-student :: layout(~{::title}, ~{::section})}">
<head><title>EduNexus - Kết quả bài trắc nghiệm</title></head>
<body>
<section class="max-w-xl mx-auto text-center">
  <h1 class="font-headline-lg text-headline-lg text-ink-deep mb-6">Kết quả bài trắc nghiệm</h1>

  <div class="w-40 h-40 mx-auto rounded-full bg-primary/10 flex items-center justify-center mb-6">
    <span class="font-display-lg text-headline-lg text-primary" th:text="${attempt.score} + '%'">0%</span>
  </div>

  <div class="grid grid-cols-3 gap-4 mb-8">
    <div class="rounded-xl border border-hairline-soft p-4">
      <p class="text-secondary text-[12px]">Đúng</p>
      <p class="font-headline-md text-success" th:text="${attempt.correctCount}">0</p>
    </div>
    <div class="rounded-xl border border-hairline-soft p-4">
      <p class="text-secondary text-[12px]">Sai</p>
      <p class="font-headline-md text-critical" th:text="${attempt.questionCount - attempt.correctCount}">0</p>
    </div>
    <div class="rounded-xl border border-hairline-soft p-4">
      <p class="text-secondary text-[12px]">Thời gian</p>
      <p class="font-headline-md text-ink" th:text="${attempt.durationSeconds} + 's'">0s</p>
    </div>
  </div>

  <div class="flex justify-center gap-3">
    <a th:href="@{'/student/quizzes/' + ${attempt.id} + '/review'}" class="px-6 py-2 rounded-full bg-primary text-on-primary font-label-md">Xem lại đáp án</a>
    <a href="/student/quizzes" class="px-6 py-2 rounded-full border border-hairline font-label-md">Về lịch sử</a>
  </div>
</section>
</body>
</html>
