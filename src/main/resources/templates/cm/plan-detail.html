<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-cm :: layout(~{::title}, ~{::section})}">
<head><title>EduNexus - Chi tiết gói thuê bao</title></head>
<body>
<section>
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="font-headline-lg text-headline-lg text-ink-deep"
          th:text="${isNew} ? 'Tạo gói thuê bao mới' : 'Chi tiết gói thuê bao'">Gói thuê bao</h1>
      <p class="text-secondary font-body-sm">Nhóm khóa học: <span th:text="${group.name}">Group</span></p>
    </div>
    <div th:unless="${isNew}" class="flex items-center gap-3">
      <span class="px-2.5 py-1 rounded-full text-[11px] font-label-md uppercase"
            th:classappend="${plan.status.name() == 'ACTIVE'} ? 'bg-success/10 text-success' : 'bg-critical/10 text-critical'"
            th:text="${plan.status}">ACTIVE</span>
      <form th:if="${plan.status.name() == 'ACTIVE'}" th:action="@{'/cm/plans/' + ${plan.id} + '/deactivate'}" method="post">
        <button type="submit" class="px-4 py-2 rounded-full bg-critical/10 text-critical font-label-md">Ngừng kích hoạt</button>
      </form>
      <form th:if="${plan.status.name() == 'INACTIVE'}" th:action="@{'/cm/plans/' + ${plan.id} + '/activate'}" method="post">
        <button type="submit" class="px-4 py-2 rounded-full bg-success/10 text-success font-label-md">Kích hoạt</button>
      </form>
    </div>
  </div>

  <form th:action="${isNew} ? @{'/cm/plans?groupId=' + ${group.id}} : @{'/cm/plans/' + ${plan.id}}"
        th:object="${planForm}" method="post" class="max-w-2xl space-y-4 rounded-xxxl border border-hairline-soft bg-canvas p-8">
    <div>
      <label class="block font-label-md text-label-md mb-1">Tên gói</label>
      <input th:field="*{name}" required class="w-full border border-hairline rounded-lg px-3 py-2"/>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block font-label-md text-label-md mb-1">Thời hạn (tháng)</label>
        <select th:field="*{durationMonths}" class="w-full border border-hairline rounded-lg px-3 py-2">
          <option value="1">1 tháng</option>
          <option value="3">3 tháng</option>
          <option value="6">6 tháng</option>
          <option value="12">12 tháng</option>
        </select>
      </div>
      <div>
        <label class="block font-label-md text-label-md mb-1">Giá (đ)</label>
        <input type="number" min="0" step="1000" th:field="*{price}" class="w-full border border-hairline rounded-lg px-3 py-2"/>
      </div>
    </div>
    <div class="flex justify-end gap-3 pt-2">
      <a href="/cm/plans" class="px-5 py-2 rounded-full border border-hairline">Hủy</a>
      <button type="submit" class="px-5 py-2 rounded-full bg-primary text-on-primary">Lưu</button>
    </div>
  </form>
</section>
</body>
</html>
