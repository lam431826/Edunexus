<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-teacher :: layout(~{::title}, ~{::section})}">
<head><title>EduNexus - Chấm bài chi tiết</title></head>
<body>
<section class="max-w-4xl">
  <a href="/teacher/grading" class="flex items-center gap-2 text-secondary hover:text-ink font-body-sm mb-6 w-fit">
    <span class="material-symbols-outlined text-[18px]">arrow_back</span> Về hàng đợi chấm bài
  </a>

  <div class="flex items-center justify-between mb-2">
    <h1 class="font-headline-lg text-headline-lg text-ink-deep" th:text="${assignment.title}">Assignment</h1>
    <span class="px-2.5 py-1 rounded-full text-[11px] font-label-md uppercase"
          th:classappend="${submission.status.name() == 'TEACHER_CONFIRMED'} ? 'bg-success/10 text-success' : 'bg-attention/10 text-attention'"
          th:text="${submission.status}">AI_SCORED</span>
  </div>
  <p class="text-secondary font-body-sm mb-6">
    Học viên: <span class="font-bold text-ink" th:text="${submission.student.name}">Student</span>
    (<span th:text="${submission.student.email}">email</span>)
  </p>

  <div class="rounded-xl border border-hairline-soft bg-canvas p-4 mb-6">
    <p class="font-label-md text-secondary mb-2">Bài làm của học viên</p>
    <p class="text-body-sm whitespace-pre-wrap" th:text="${submission.contentText}">Content</p>
    <p th:if="${submission.filePath}" class="mt-2 text-[13px]">
      <a th:href="${submission.filePath}" target="_blank" class="text-primary hover:underline">Xem tệp đính kèm</a>
    </p>
  </div>

  <div class="rounded-xl bg-surface-soft p-4 mb-6">
    <p class="font-label-md text-secondary mb-1">Điểm AI chấm sơ bộ</p>
    <p class="font-headline-md text-headline-md text-ink mb-2" th:text="${submission.aiScore} + '/' + ${assignment.maxScore}">0/100</p>
    <p class="text-body-sm text-secondary" th:text="${submission.aiFeedback}">AI feedback</p>
  </div>

  <form th:action="@{'/teacher/grading/' + ${submission.id} + '/confirm'}" th:object="${gradeForm}" method="post" class="space-y-6">
    <div th:if="${not #lists.isEmpty(gradeForm.rubricScores)}">
      <label class="block font-label-md text-label-md mb-2">Điều chỉnh điểm theo tiêu chí</label>
      <table class="w-full text-left rounded-xl border border-hairline-soft overflow-hidden">
        <thead class="bg-surface-soft font-label-md text-secondary">
          <tr><th class="p-3">Tiêu chí</th><th class="p-3 w-28">Điểm</th><th class="p-3">Nhận xét</th></tr>
        </thead>
        <tbody>
          <tr th:each="rs, stat : *{rubricScores}" class="border-t border-hairline-soft">
            <td class="p-3 font-label-md text-ink" th:text="${submission.rubricScores[stat.index].criterion.name}">Criterion</td>
            <td class="p-3">
              <input type="hidden" th:field="*{rubricScores[__${stat.index}__].id}"/>
              <input type="number" th:field="*{rubricScores[__${stat.index}__].score}" class="w-20 border border-hairline rounded-lg px-2 py-1"/>
            </td>
            <td class="p-3">
              <input th:field="*{rubricScores[__${stat.index}__].remark}" class="w-full border border-hairline rounded-lg px-2 py-1"/>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block font-label-md text-label-md mb-1">Điểm chính thức</label>
        <input type="number" th:field="*{teacherScore}" required class="w-full border border-hairline rounded-lg px-3 py-2"/>
      </div>
      <div class="flex items-end text-[12px] text-secondary">Thang điểm tối đa: <span th:text="${assignment.maxScore}" class="ml-1 font-bold"></span></div>
    </div>
    <div>
      <label class="block font-label-md text-label-md mb-1">Nhận xét cho học viên</label>
      <textarea th:field="*{teacherFeedback}" rows="6" class="w-full border border-hairline rounded-lg px-3 py-2"></textarea>
    </div>

    <button type="submit" class="px-6 py-2 rounded-full bg-primary text-on-primary font-label-md flex items-center gap-2">
      <span class="material-symbols-outlined text-[18px]">check_circle</span> Xác nhận điểm
    </button>
  </form>
</section>
</body>
</html>
